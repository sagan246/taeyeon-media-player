name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: python -m pip install -e ".[dev,images]"
      - name: Compile Python
        run: python -m compileall -q media_player.py launcher_gui.py src
      - name: Run Python tests
        run: python -m pytest
      - name: Check JavaScript syntax
        shell: bash
        run: find assets -maxdepth 1 -name '*.js' -print0 | xargs -0 -n1 node --check

