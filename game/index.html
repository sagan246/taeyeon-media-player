<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#11131a">
  <title>Drift & Touch</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="game" aria-label="Drift and Touch game">
    <header class="hud">
      <div class="scores">
        <div>
          <span class="eyebrow">SCORE</span>
          <strong id="score" aria-live="polite">0</strong>
        </div>
        <div class="best-score">
          <span class="eyebrow">BEST</span>
          <strong id="best">0</strong>
        </div>
      </div>
      <div class="hud-actions">
        <span id="status">Ready</span>
        <button id="pieces-mode" type="button" aria-label="Use numbered pieces" title="Photo pieces">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="10" r="2"/><path d="m5 17 5-5 3 3 2-2 4 4"/></svg>
        </button>
        <button id="pause" type="button" aria-label="Pause game">&#8545;</button>
      </div>
    </header>

    <section id="field" aria-label="Play field">
      <div class="grid-glow"></div>
      <div id="floaters" aria-hidden="true"></div>
    </section>

  </main>
  <script src="game.js"></script>
</body>
</html>
