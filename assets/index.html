<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#000000">
  <title>Local Media Player</title>
  <link rel="stylesheet" href="/assets/styles.css?v=lyric-line-rhythm1">
</head>
<body class="listen music">
  <header>
    <div class="bar">
      <div>
        <h1>Local Media Player</h1>
        <div class="appTabs topTabs">
          <button id="musicTab" class="mediaTab topTab topAction iconOnly" title="Music" aria-label="Music"><svg class="buttonIcon" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 18V5l11-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="17" cy="16" r="3"/></svg></button>
          <button id="videoTab" class="mediaTab topTab topAction inactive iconOnly" title="Videos" aria-label="Videos"><svg class="buttonIcon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 8h16v11H4z"/><path d="M4 8l3-5h13l-3 5"/><path d="M9 3L6 8"/><path d="M14 3l-3 5"/></svg></button>
          <button id="interviewsTab" class="mediaTab topTab topAction inactive iconOnly" title="Interviews" aria-label="Interviews"><svg class="buttonIcon" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3h7l4 4v14H7z"/><path d="M14 3v5h5"/><path d="M10 12h6"/><path d="M10 16h6"/></svg></button>
          <button id="statsTab" class="mediaTab topTab topAction inactive iconOnly" title="Stats" aria-label="Stats"><svg class="buttonIcon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19V5"/><path d="M4 19h16"/><path d="M8 16v-5"/><path d="M12 16V8"/><path d="M16 16v-9"/></svg></button>
          <button id="customizeTab" class="mediaTab topTab topAction inactive iconOnly" title="Customize" aria-label="Customize"><svg class="buttonIcon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16"/><path d="M4 17h16"/><circle cx="9" cy="7" r="2"/><circle cx="15" cy="17" r="2"/></svg></button>
          <button id="healthTab" class="mediaTab topTab topAction inactive iconOnly" title="Health" aria-label="Health"><svg class="buttonIcon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 6L9 17l-5-5"/></svg></button>
          <button id="refresh" class="secondary topAction iconOnly" title="Refresh library" aria-label="Refresh library"><svg class="buttonIcon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11a8 8 0 1 0-2.3 5.7"/><path d="M20 4v7h-7"/></svg></button>
          <button id="listenMode" class="ghost topAction active iconOnly" title="Listen Mode" aria-label="Listen Mode"><svg class="buttonIcon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 13v-1a8 8 0 0 1 16 0v1"/><path d="M5 13h3v6H5z"/><path d="M16 13h3v6h-3z"/></svg></button>
          <button id="editMode" class="ghost topAction iconOnly" title="Edit Mode" aria-label="Edit Mode"><svg class="buttonIcon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20h4l11-11-4-4L4 16z"/><path d="M13 7l4 4"/></svg></button>
          <a class="ghost topAction iconOnly iconLink" href="https://github.com/sagan246/local-media-player" target="_blank" rel="noopener noreferrer" title="View source on GitHub" aria-label="View source on GitHub"><svg class="buttonIcon" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.9a3.4 3.4 0 0 0-.9-2.6c3-.3 6.1-1.5 6.1-6.7a5.2 5.2 0 0 0-1.4-3.6 4.8 4.8 0 0 0-.1-3.6s-1.1-.3-3.7 1.4a12.8 12.8 0 0 0-6.7 0C6.7.3 5.6.6 5.6.6a4.8 4.8 0 0 0-.1 3.6 5.2 5.2 0 0 0-1.4 3.6c0 5.2 3.1 6.4 6.1 6.7a3.4 3.4 0 0 0-.9 2.6V22"/></svg></a>
        </div>
      </div>
      <input id="searchBox" type="search" placeholder="Search title, album, folder">
      <select id="musicFilter" class="musicOnly"><option value="all">Library filter</option><optgroup label="Artwork"><option value="art:with">With artwork</option><option value="art:missing">Missing artwork</option></optgroup><optgroup label="Metadata"><option value="missing:any">Missing anything</option><option value="missing:album">Missing album</option><option value="missing:date">Missing date</option><option value="missing:tracknumber">Missing track #</option><option value="missing:genre">Missing genre</option><option value="review:any">Needs review</option><option value="review:non-English title">Non-English title</option><option value="review:suspicious album">Suspicious album</option></optgroup></select>
      <div class="stats" id="stats"></div>
    </div>
  </header>
  <main>
    <nav class="browsePanel">
      <div class="navHead browseHead">
        <div class="browseTitleWrap">
          <button id="toggleBrowsePanel" class="browseHeadButton" type="button">Browse</button>
          <span id="browseSummary" class="browseSummary"></span>
        </div>
        <button id="closeBrowse" class="secondary closeBrowse iconControl" type="button" title="Close browse" aria-label="Close browse">&#10005;</button>
      </div>
      <div class="groupList browseList" id="groups"></div>
      <div class="bulkPanel">
        <strong id="selectedCount">0 selected</strong>
        <input id="bulkArtist" placeholder="Bulk artist">
        <input id="bulkAlbum" placeholder="Bulk album">
        <input id="bulkAlbumArtist" placeholder="Bulk album artist">
        <input id="bulkDate" placeholder="Bulk date">
        <input id="bulkGenre" placeholder="Bulk genre">
        <button id="bulkSave" type="button">Apply to Selected</button>
        <button id="clearSelected" type="button" class="secondary">Clear Selection</button>
      </div>
    </nav>
    <div class="workspace">
      <section class="controls musicOnly">
        <span class="viewTitle" id="viewTitle">All</span>
        <button id="browseMusic" class="secondary browseToggle iconOnly" type="button" title="Browse" aria-label="Browse"><svg class="buttonIcon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7h6l2 3h10v9H3z"/><path d="M3 7v12"/></svg></button>
        <button id="topQueueToggle" class="secondary queueCountButton" title="Queue" aria-label="Queue"><svg class="buttonIcon" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/></svg><span>0</span></button>
        <select id="albumViewMode" title="Album view" aria-label="Album view">
          <option value="newest">Newest</option>
          <option value="oldest">Oldest</option>
          <option value="sections">Sections</option>
          <option value="years">Year</option>
        </select>
        <button id="playShownMusic" class="secondary iconControl" type="button" title="Play shown songs" aria-label="Play shown songs">&#9654;</button>
        <button id="shuffleShownMusic" class="secondary iconControl" type="button" title="Shuffle shown songs" aria-label="Shuffle shown songs">&#8644;</button>
        <button id="showAllAlbums" class="secondary iconControl overlayClose" hidden title="Close album" aria-label="Close album">&#10005;</button>
        <span class="spacer"></span>
      </section>
      <section class="albumShelf musicOnly">
        <div class="albumGrid" id="albumGrid"></div>
      </section>
      <section class="tableWrap musicOnly"><table><thead><tr><th class="checkCell"><input id="selectShown" class="rowCheck" type="checkbox"></th><th class="sortable" data-sort="has_artwork">Art</th><th class="sortable" data-sort="title">Title</th><th class="sortable" data-sort="artist">Artist</th><th class="sortable" data-sort="album">Album</th><th class="sortable" data-sort="date">Date</th><th class="sortable" data-sort="path">Path</th><th>Actions</th></tr></thead><tbody id="rows"></tbody></table></section>
      <section class="videoPanel videoOnly">
        <div class="controls">
          <span class="viewTitle" id="videoViewTitle">Videos</span>
          <button id="browseVideo" class="secondary browseToggle iconOnly" type="button" title="Browse" aria-label="Browse"><svg class="buttonIcon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7h6l2 3h10v9H3z"/><path d="M3 7v12"/></svg></button>
          <button id="videoQueueToggle" class="secondary queueCountButton" title="Video queue" aria-label="Video queue"><svg class="buttonIcon" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/></svg><span>0</span></button>
          <select id="videoSort" title="Video view" aria-label="Video view">
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
            <option value="sections">Sections</option>
          </select>
          <button id="shuffleShownVideo" class="secondary iconControl" type="button" title="Shuffle shown videos" aria-label="Shuffle shown videos">&#8644;</button>
          <span class="spacer"></span>
        </div>
        <div class="videoPlayerCard">
          <video id="videoPlayer" class="videoPlayer" controls preload="metadata" playsinline webkit-playsinline></video>
          <div class="videoTitle" id="videoTitle"></div>
          <div class="videoMeta" id="videoMeta"></div>
          <div class="videoQueueControls">
            <button id="prevVideo" class="secondary iconControl" title="Previous video" aria-label="Previous video">&#9664;&#9664;</button>
            <button id="nextVideo" class="secondary iconControl" title="Next video" aria-label="Next video">&#9654;&#9654;</button>
            <button id="stopVideo" class="secondary iconControl" title="Stop video" aria-label="Stop video">&#9632;</button>
            <button id="videoRepeatBtn" class="secondary iconControl repeatButton" title="Video repeat off" aria-label="Video repeat off">&#8635;</button>
          </div>
        </div>
        <div class="videoGrid" id="videoGrid"></div>
      </section>
      <section class="healthPanel healthOnly" id="healthPanel"></section>
      <section class="statsPanel statsOnly" id="listeningStatsPanel"></section>
      <section class="customizePanel customizeOnly" id="customizePanel">
        <div class="customizeCard">
          <div class="themeGrid" id="themeGrid"></div>
        </div>
      </section>
      <section class="controls interviewsOnly">
        <span class="viewTitle" data-text-label>Interviews</span>
        <button id="browseInterviews" class="secondary browseToggle iconOnly" type="button" title="Browse" aria-label="Browse"><svg class="buttonIcon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7h6l2 3h10v9H3z"/><path d="M3 7v12"/></svg></button>
        <button id="shuffleInterviews" class="secondary iconControl" type="button" title="Random interview" aria-label="Random interview">&#8644;</button>
      </section>
      <section class="interviewsPanel interviewsOnly">
        <div class="interviewList browsePanel" id="interviewList">
          <div class="interviewBrowseHead browseHead">
            <div class="browseTitleWrap">
              <button id="toggleInterviewBrowsePanel" class="browseHeadButton" type="button">Browse</button>
              <span id="interviewBrowseSummary" class="browseSummary"></span>
            </div>
            <button id="closeInterviewBrowse" class="secondary closeBrowse iconControl" type="button" title="Close browse" aria-label="Close browse">&#10005;</button>
          </div>
          <div class="interviewItems browseList" id="interviewItems"></div>
        </div>
        <article class="interviewReader" id="interviewReader">
          <h2 data-text-label>Interviews</h2>
          <div class="interviewReaderMeta">Choose an interview to read.</div>
          <div class="interviewText" data-text-empty>Text files are loaded locally from media\\Interviews.</div>
        </article>
      </section>
    </div>
    <aside id="detail" class="musicOnly"><div class="bigCover emptyCover">Select a song</div></aside>
  </main>
  <div class="playerBar musicOnly">
    <div class="now" id="nowInfo"><div class="noArt">?</div><div class="nowText"></div></div>
    <div class="transport">
      <button id="prevBtn" class="secondary iconControl" title="Previous" aria-label="Previous">&#9664;&#9664;</button>
      <button id="playPauseBtn" class="playButton iconControl" title="Play/Pause" aria-label="Play/Pause">&#9654;</button>
      <button id="nextBtn" class="secondary iconControl" title="Next" aria-label="Next">&#9654;&#9654;</button>
      <button id="repeatBtn" class="secondary iconControl repeatButton" title="Repeat off" aria-label="Repeat off">&#8635;</button>
    </div>
    <div class="playback">
      <span id="currentTime">0:00</span>
      <input id="seekBar" type="range" min="0" max="1000" value="0">
      <span id="duration">0:00</span>
    </div>
    <div class="volume">
      <span>Vol</span>
      <input id="volumeBar" type="range" min="0" max="1" value="0.85" step="0.01" title="Volume">
    </div>
    <audio id="player"></audio>
  </div>
  <div id="queueToast" class="queueToast" role="status" aria-live="polite"></div>
  <section id="queueDrawer" class="queueDrawer queuePanel musicOnly" aria-label="Now Playing Queue">
    <div class="queueHead queuePanelHead">
      <div class="queueHeadTop">
        <button id="toggleQueueTitle" class="queueTitleButton" type="button">Music Queue</button>
        <div id="queueSummary" class="queueSummary">0 tracks</div>
        <button id="closeQueue" class="secondary iconControl" title="Close" aria-label="Close">&#10005;</button>
      </div>
      <div class="queueActions queuePanelActions">
        <button id="repeatQueue" class="secondary iconControl repeatButton" title="Repeat off" aria-label="Repeat off">&#8635;</button>
        <button id="shuffleQueue" class="secondary iconControl" title="Shuffle queue" aria-label="Shuffle queue">&#8644;</button>
        <button id="clearQueue" class="secondary iconControl" title="Clear queue" aria-label="Clear queue"><svg class="buttonIcon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 15h10l1-15"/><path d="M10 11v6"/><path d="M14 11v6"/></svg></button>
      </div>
    </div>
    <div id="queueList" class="queueList queuePanelList"></div>
  </section>
  <section id="nowPlayingDrawer" class="nowPlayingDrawer musicOnly" aria-label="Now Playing">
    <div class="nowPlayingHead">
      <h2>Now Playing</h2>
      <button id="closeNowPlaying" class="secondary iconControl overlayClose" title="Close" aria-label="Close">&#10005;</button>
    </div>
    <div class="nowPlayingBody" id="nowPlayingBody"></div>
  </section>
  <section id="videoQueueDrawer" class="queueDrawer queuePanel videoOnly" aria-label="Video Queue">
    <div class="queueHead queuePanelHead">
      <div class="queueHeadTop">
        <button id="toggleVideoQueueTitle" class="queueTitleButton" type="button">Video Queue</button>
        <div id="videoQueueSummary" class="queueSummary">0 videos</div>
        <button id="closeVideoQueue" class="secondary iconControl" title="Close" aria-label="Close">&#10005;</button>
      </div>
      <div class="queueActions queuePanelActions">
        <button id="repeatVideoQueue" class="secondary iconControl repeatButton" title="Video repeat off" aria-label="Video repeat off">&#8635;</button>
        <button id="shuffleVideoQueue" class="secondary iconControl" title="Shuffle video queue" aria-label="Shuffle video queue">&#8644;</button>
        <button id="clearVideoQueue" class="secondary iconControl" title="Clear video queue" aria-label="Clear video queue"><svg class="buttonIcon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 15h10l1-15"/><path d="M10 11v6"/><path d="M14 11v6"/></svg></button>
      </div>
    </div>
    <div id="videoQueueList" class="queueList queuePanelList"></div>
  </section>
  <script src="/assets/theme-data.js?v=theme-data1"></script>
  <script src="/assets/theme-engine.js?v=theme-engine1"></script>
  <script src="/assets/ui-helpers.js?v=ui-helpers1"></script>
  <script src="/assets/components.js?v=components1"></script>
  <script src="/assets/music-components.js?v=music-components1"></script>
  <script src="/assets/queue-components.js?v=queue-components1"></script>
  <script src="/assets/video-components.js?v=video-components1"></script>
  <script src="/assets/stats-components.js?v=stats-components1"></script>
  <script src="/assets/lyrics.js?v=lyrics1"></script>
  <script src="/assets/now-playing-components.js?v=now-playing-components1"></script>
  <script src="/assets/app.js?v=cleanup-ui1"></script>
</body>
</html>
